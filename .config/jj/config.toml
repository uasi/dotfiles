"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Tomoki Aonuma"
email = "uasi@uasi.jp"

[aliases]
abandon-blank = ["abandon", "-r", "blank() & mutable() ~ @"]
tug = ["bookmark", "move", "--from", "heads(::@ & bookmarks())", "--to", "closest_pushable(@)"]

[revset-aliases]
"blank()" = "(empty() ~ merges() ~ root()) & description(exact:'')"
"meaningful()" = "(~empty() | merges()) ~ description(exact:'')"

"closest_pushable(to)" = "heads(::to & meaningful() & mutable())"

# Command-line use only. Don't nest in other aliases to keep them easy to reason about.
"local()" = "all() ~ ::remote_bookmarks() ~ blank()"
"my_local()" = "mine() ~ ::remote_bookmarks() ~ blank()"
"untitled()" = "description(exact:'') ~ root()"

[git]
private-commits = "description(glob-i:'wip[: ]*') | description(glob:'// *')"

[ui]
default-command = "status"
diff-editor = ":builtin"

[fix.tools.swift-format]
command = ["swift-format", "format", "--ignore-unparsable-files", "-"]
patterns = ["glob:**/*.swift"]
